# =====================================================================
# Perfil DEV — valores padrão para execução local
# Ativo quando SPRING_PROFILES_ACTIVE=dev (ou omitido)
# =====================================================================

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/guarddb}
    username: ${SPRING_DATASOURCE_USERNAME:guard_user}
    password: ${SPRING_DATASOURCE_PASSWORD:guard_pass}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  seed:
    admin-email: ${SEED_ADMIN_EMAIL:admin@guard.io}
    admin-password: ${SEED_ADMIN_PASSWORD:Admin@Guard123}
