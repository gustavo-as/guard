spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/guarddb
    username: guard_user
    password: guard_pass

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.operis.guard: DEBUG

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:4200
  initializer:
    enabled: true
  admin:
    email: admin@guard.dev
    password: admin123!