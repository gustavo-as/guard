spring:
  application:
    name: guard

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver

jwt:
  private-key: ${JWT_PRIVATE_KEY_PATH:classpath:certs/private.pem}
  public-key: ${JWT_PUBLIC_KEY_PATH:classpath:certs/public.pem}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  initializer:
    enabled: ${INITIALIZER_ENABLED:false}
  admin:
    email: ${ADMIN_EMAIL:admin@guard.prod}
    password: ${ADMIN_PASSWORD:admin123!}
